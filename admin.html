<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Controle — Larissa & Lucas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #EEE4DA; --blush: #e8c9b8; --rose: #c98b72;
      --gold: #b8975a; --dark: #3a2e28; --mid: #7a6659; --light: #f5ede6;
    }
    body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--dark); margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1 { font-family: 'Cormorant Garamond', serif; text-align: center; color: var(--dark); font-size: 2.5rem; margin-bottom: 30px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { padding: 20px; text-align: center; border: 1px solid var(--blush); border-radius: 4px; }
    .stat-card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--mid); margin: 0; }
    .stat-card p { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--rose); margin: 10px 0 0; }

    .lists-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    .list-section { background: var(--light); padding: 20px; border-radius: 4px; }
    .list-section h3 { font-family: 'Cormorant Garamond', serif; border-bottom: 1px solid var(--blush); padding-bottom: 10px; margin-bottom: 15px; }
    
    ul { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; }
    li { padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; display: flex; justify-content: space-between; }
    li:last-child { border: none; }
    
    .badge-sim { color: #2e6f40; font-weight: bold; }
    .badge-nao { color: #a33c3c; font-weight: bold; }
    .badge-pendente { color: var(--mid); font-style: italic; }

    .btn-refresh { display: block; margin: 20px auto; padding: 10px 20px; background: var(--dark); color: #fff; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem; }
    .btn-refresh:hover { background: var(--rose); }
    
    .back-link { display: block; text-align: center; margin-top: 30px; color: var(--mid); text-decoration: none; font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="container">
  <h1>Painel de Convidados</h1>
  
  <div class="stats-grid">
    <div class="stat-card">
      <h2>Confirmados</h2>
      <p id="confirmedCount">0</p>
    </div>
    <div class="stat-card">
      <h2>Não irão</h2>
      <p id="declinedCount">0</p>
    </div>
    <div class="stat-card">
      <h2>Pendentes</h2>
      <p id="noResponseCount">0</p>
    </div>
  </div>

  <button class="btn-refresh" onclick="buscarDadosECarregarModal()">Atualizar Lista</button>

  <div class="lists-grid">
    <div class="list-section">
      <h3>✅ Confirmaram (Sim)</h3>
      <ul id="confirmedList"><li>Carregando...</li></ul>
    </div>
    <div class="list-section">
      <h3>❌ Não Poderão Ir</h3>
      <ul id="declinedList"><li>Carregando...</li></ul>
    </div>
    <div class="list-section">
      <h3>⏳ Aguardando Resposta</h3>
      <ul id="noResponseList"><li>Carregando...</li></ul>
    </div>
  </div>

  <a href="index.html" class="back-link">← Voltar para o site</a>
</div>

<!-- Reutilizamos o script.js para não duplicar lógica -->
<script src="script.js"></script>
<script>
  // Quando a página admin carregar, busca os dados automaticamente
  window.addEventListener('DOMContentLoaded', () => {
    buscarDadosECarregarModal();
  });
</script>

</body>
</html>
